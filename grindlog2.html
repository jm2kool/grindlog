<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="GrindLog"/>
<meta name="theme-color" content="#000"/>
<title>GrindLog</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --g:#6ee7b7; --gd:#34d399; --bg:#000; --s1:#0d0d0d; --s2:#161616; --b1:#1e1e1e; --b2:#2a2a2a;
  --t1:#ffffff; --t2:#aaaaaa; --t3:#555555; --t4:#2e2e2e;
  --red:#f87171; --amber:#fbbf24;
  --st:env(safe-area-inset-top,0px); --sb:env(safe-area-inset-bottom,0px);
  --r:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
html,body{height:100%;background:var(--bg);color:var(--t2);font-family:'DM Mono',monospace;overscroll-behavior:none}
#app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;background:var(--bg);position:relative}

/* ── HEADER ── */
.hdr{background:var(--bg);padding:calc(var(--st) + 16px) 20px 14px;flex-shrink:0;border-bottom:1px solid var(--b1)}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--t1);letter-spacing:-.5px}
.logo em{color:var(--g);font-style:normal}
.streak-pill{display:flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--b1);padding:7px 14px;border-radius:20px}
.streak-n{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--g);line-height:1}
.streak-info{display:flex;flex-direction:column;gap:1px}
.streak-lbl{font-size:9px;color:var(--t3);letter-spacing:1px}
.streak-fire{font-size:14px}
.wk-progress{display:flex;align-items:center;gap:10px}
.wk-lbl{font-size:10px;color:var(--t3);letter-spacing:.5px;white-space:nowrap}
.wk-bar-wrap{flex:1;height:4px;background:var(--b1);border-radius:2px}
.wk-bar-fill{height:100%;background:linear-gradient(90deg,var(--g),var(--gd));border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.wk-val{font-size:10px;color:var(--g);letter-spacing:.5px;white-space:nowrap;font-family:'Syne',sans-serif;font-weight:700}

/* ── NAV TABS ── */
.tabs{display:flex;background:var(--bg);border-bottom:1px solid var(--b1);flex-shrink:0}
.tab{flex:1;padding:13px 0;font-size:10px;letter-spacing:1.5px;font-family:'DM Mono',monospace;background:none;border:none;border-bottom:2px solid transparent;color:var(--t3);cursor:pointer;transition:color .15s,border-color .15s}
.tab.on{color:var(--g);border-bottom-color:var(--g)}

/* ── SCROLL AREA ── */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(var(--sb) + 24px)}

/* ── WEEK VIEW ── */
.wk-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.wk-nav-lbl{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--t2);letter-spacing:.5px}
.wk-nav-date{font-size:9px;color:var(--t3);margin-top:1px;letter-spacing:.3px}
.nav-arr{background:none;border:1px solid var(--b1);color:var(--t3);width:36px;height:36px;border-radius:10px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.nav-arr:active{background:var(--s2);color:var(--t2)}
.nav-arr.dim{color:var(--b2);border-color:var(--b1);cursor:default}

.day-card{display:flex;align-items:center;gap:14px;padding:14px 16px;margin-bottom:6px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);cursor:pointer;transition:background .12s,border-color .12s;-webkit-user-select:none;user-select:none}
.day-card:active{background:var(--s2)}
.day-card.today{background:#061510;border-color:#1a3828}
.day-card.is-rest{opacity:.35;cursor:default;pointer-events:none}
.day-card.is-rest-swap{background:#0a0a0a;border-color:var(--b1)}
.day-em{font-size:24px;width:32px;text-align:center;flex-shrink:0}
.day-body{flex:1;min-width:0}
.day-top{display:flex;align-items:center;gap:8px;margin-bottom:2px}
.day-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--t2)}
.day-card.today .day-name{color:var(--g)}
.pill{font-size:8px;padding:2px 7px;border-radius:5px;font-weight:700;letter-spacing:.8px}
.pill-today{background:var(--g);color:#000}
.pill-rest{background:var(--b2);color:var(--t3)}
.pill-done{background:#071510;color:var(--g);border:1px solid #1a3828}
.day-sub{font-size:11px;color:var(--t3)}
.day-kcal{font-size:10px;color:#2d7a52;margin-top:2px}
.mini-prog{width:100%;height:2px;background:var(--b1);border-radius:2px;margin-top:8px;overflow:hidden}
.mini-prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--g),var(--gd));transition:width .3s}
.day-right{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--t3);flex-shrink:0}
.day-right.g{color:var(--g)}

/* ── LOG VIEW ── */
.day-scroller{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:20px;scrollbar-width:none}
.day-scroller::-webkit-scrollbar{display:none}
.dtab{padding:9px 16px;border-radius:10px;font-size:11px;font-family:'DM Mono',monospace;letter-spacing:.8px;background:var(--s1);color:var(--t3);border:1px solid var(--b1);white-space:nowrap;cursor:pointer;transition:all .12s;-webkit-user-select:none;user-select:none}
.dtab.on{background:var(--g);color:#000;font-weight:700;border-color:var(--g)}
.dtab.done{color:var(--g);border-color:#1a3828;background:#071510}
.dtab.tod{border-color:#1a3828}

.log-title-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;gap:12px}
.log-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--t1);line-height:1.1}
.log-complete-badge{background:#071510;border:1px solid #1a3828;color:var(--g);font-size:9px;padding:5px 10px;border-radius:8px;letter-spacing:1px;white-space:nowrap;margin-top:4px}

/* section label */
.sec{font-size:9px;color:var(--t3);letter-spacing:2px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:var(--b1)}

/* ── EXERCISES ── */
.ex-list{margin-bottom:8px}
.ex-item{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:12px;margin-bottom:4px;cursor:pointer;transition:background .1s;position:relative}
.ex-item:active{background:rgba(255,255,255,.03)}
.chk{width:24px;height:24px;border-radius:6px;border:1.5px solid var(--b2);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.chk.on{background:var(--g);border-color:var(--g)}
.chk.on::after{content:'✓';font-size:13px;font-weight:700;color:#000}
.ex-label{flex:1;min-width:0}
.ex-nm{font-size:15px;color:var(--t2);transition:color .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-nm.done{color:var(--t4);text-decoration:line-through}
.ex-meta{display:flex;align-items:center;gap:6px;margin-top:2px}
.ex-sets-lbl{font-size:10px;color:var(--t3)}
.po-tag{font-size:9px;color:var(--g);background:#071510;border:1px solid #1a3828;padding:1px 6px;border-radius:4px;letter-spacing:.5px}
.ex-btn{background:none;border:1px solid var(--b1);color:var(--t3);font-size:9px;padding:4px 9px;border-radius:7px;font-family:'DM Mono',monospace;cursor:pointer;flex-shrink:0;letter-spacing:.5px;transition:all .12s}
.ex-btn:active{background:var(--s2)}

.prog-track{height:2px;background:var(--b1);border-radius:2px;margin:-4px 0 16px}
.prog-track-fill{height:100%;background:var(--g);border-radius:2px;transition:width .3s}

/* add exercise row */
.add-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;cursor:pointer;color:var(--t3);font-size:12px;letter-spacing:.5px;border:1px dashed var(--b2);margin-bottom:16px;transition:all .12s}
.add-row:active{background:var(--s1)}
.add-row-icon{width:22px;height:22px;border-radius:6px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--t3)}

/* ── WALK TOGGLE ── */
.walk-toggle{display:flex;align-items:center;gap:14px;padding:16px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);cursor:pointer;margin-bottom:8px;transition:all .15s}
.walk-toggle.on{background:#061510;border-color:#1a3828}
.walk-icon{font-size:26px;flex-shrink:0}
.walk-text{flex:1}
.walk-title{font-size:14px;color:var(--t2);transition:color .15s}
.walk-toggle.on .walk-title{color:var(--g)}
.walk-hint{font-size:10px;color:var(--t3);margin-top:2px}
.walk-toggle.on .walk-hint{color:#2d7a52}
.walk-check{width:28px;height:28px;border-radius:8px;border:1.5px solid var(--b2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.walk-toggle.on .walk-check{background:var(--g);border-color:var(--g)}
.walk-toggle.on .walk-check::after{content:'✓';font-size:14px;font-weight:700;color:#000}

/* ── CARDS ── */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:16px;margin-bottom:8px}
.card-row{display:flex;align-items:center;gap:12px}
.card-lbl{font-size:10px;color:var(--t3);letter-spacing:.8px;flex:1}
.card-val{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--g);text-align:right;background:transparent;border:none;outline:none;width:80px}
.card-unit{font-size:11px;color:var(--t3)}
.total-card{background:#061510;border:1px solid #1a3828;border-radius:var(--r);padding:16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.total-lbl{font-size:9px;color:#2d7a52;letter-spacing:1.5px}
.total-val{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--g)}
.total-unit{font-size:11px;color:#2d7a52;margin-left:3px}
.n-input{width:100%;font-size:13px;color:var(--t2);line-height:1.8;background:transparent;border:none;outline:none;font-family:'DM Mono',monospace;resize:none}
.w-input{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--g);background:transparent;border:none;outline:none;width:100px;text-align:right}

/* ── REST DAY BTN ── */
.rest-btn{display:flex;align-items:center;gap:10px;padding:13px 16px;border-radius:12px;cursor:pointer;border:1px solid var(--b1);background:transparent;color:var(--t3);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.5px;width:100%;margin-bottom:16px;transition:all .15s}
.rest-btn:active{background:var(--s1)}
.rest-btn.active-rest{border-color:#3a1515;background:#120505;color:var(--red)}
.rest-btn-icon{font-size:16px}

/* ── REST SCREEN ── */
.rest-screen{text-align:center;padding:60px 20px 30px}
.rest-em{font-size:56px;margin-bottom:12px}
.rest-ttl{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--t3)}
.rest-sub{font-size:12px;color:var(--t4);margin-top:8px;line-height:1.8}

/* ── STATS ── */
.stats-h{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--t1);margin-bottom:16px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.sc{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:18px 14px}
.sc-em{font-size:22px;margin-bottom:8px}
.sc-val{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--g)}
.sc-lbl{font-size:9px;color:var(--t3);margin-top:3px;letter-spacing:1px}
.tip{background:#061510;border:1px solid #1a3828;border-radius:var(--r);padding:16px;margin-top:12px}
.tip-h{font-size:10px;color:var(--g);letter-spacing:1px;margin-bottom:6px}
.tip-b{font-size:12px;color:var(--t3);line-height:1.9}
.tip-b em{color:var(--t2);font-style:normal}
.wc{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:16px;margin-bottom:10px}
.wc-h{font-size:9px;color:var(--t3);letter-spacing:1.5px;margin-bottom:14px}
.wc-foot{display:flex;justify-content:space-between;margin-top:10px;font-size:11px;color:var(--t3)}
.g{color:var(--g)}.r{color:var(--red)}
.w-empty{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:28px;text-align:center;color:var(--t4);font-size:11px;letter-spacing:1px}

/* ── BOTTOM SHEET / MODAL ── */
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.sheet{background:#111;border:1px solid var(--b2);border-radius:22px 22px 0 0;width:100%;max-width:430px;max-height:92dvh;overflow-y:auto;padding:0 0 calc(var(--sb) + 8px)}
.sheet-handle{width:36px;height:4px;background:var(--b2);border-radius:2px;margin:14px auto 18px}
.sheet-inner{padding:0 20px 16px}
.sheet-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--t1);margin-bottom:4px}
.sheet-sub{font-size:10px;color:var(--t3);letter-spacing:1px;margin-bottom:20px}

/* form elements in sheet */
.f-label{font-size:9px;color:var(--t3);letter-spacing:1.5px;margin-bottom:6px;display:block}
.f-input{width:100%;background:var(--s2);border:1px solid var(--b1);color:var(--t1);font-family:'DM Mono',monospace;font-size:14px;padding:12px 14px;border-radius:10px;outline:none;margin-bottom:14px;transition:border-color .12s}
.f-input:focus{border-color:var(--b2)}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.f-row .f-input{margin-bottom:0}
.f-half{display:flex;flex-direction:column}
.set-grid{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.set-r{display:flex;align-items:center;gap:10px}
.set-r-lbl{font-size:10px;color:var(--t3);width:50px;flex-shrink:0}
.set-r-in{flex:1;background:var(--s2);border:1px solid var(--b1);color:var(--g);font-family:'Syne',sans-serif;font-size:15px;font-weight:700;padding:9px 10px;border-radius:8px;outline:none;text-align:center;transition:border-color .12s}
.set-r-in:focus{border-color:var(--g)}
.po-in{border-color:#1a3828;color:var(--g)}
.po-in:focus{border-color:var(--g)}

/* scope toggle */
.scope{display:flex;background:var(--s2);border:1px solid var(--b1);border-radius:10px;overflow:hidden;margin-bottom:18px}
.scope-opt{flex:1;padding:10px;font-size:10px;font-family:'DM Mono',monospace;letter-spacing:.5px;cursor:pointer;background:transparent;color:var(--t3);border:none;transition:all .12s}
.scope-opt.on{background:var(--g);color:#000;font-weight:700}

/* sheet buttons */
.sb{width:100%;padding:15px;border-radius:12px;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:1px;cursor:pointer;border:none;margin-bottom:8px;transition:opacity .15s;font-weight:700}
.sb.prim{background:var(--g);color:#000}
.sb.prim:active{opacity:.8}
.sb.sec{background:var(--s2);color:var(--t3);border:1px solid var(--b1)}
.sb.sec:active{opacity:.7}
.sb.del{background:#120505;color:var(--red);border:1px solid #3a1515}
.sb.del:active{opacity:.8}

/* day picker */
.day-pick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.dpick{padding:12px 8px;border-radius:10px;background:var(--s2);border:1px solid var(--b1);color:var(--t2);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;text-align:center;transition:all .12s}
.dpick:active{background:var(--b1)}
.dpick.off{opacity:.25;pointer-events:none}

/* PO toggle button in edit sheet */
.po-toggle{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:10px;border:1px solid var(--b1);background:var(--s2);cursor:pointer;margin-bottom:14px;transition:all .12s}
.po-toggle.on{border-color:#1a3828;background:#061510}
.po-toggle-lbl{font-size:11px;color:var(--t2);display:flex;align-items:center;gap:8px}
.po-toggle.on .po-toggle-lbl{color:var(--g)}
.po-switch{width:34px;height:20px;border-radius:10px;background:var(--b2);position:relative;transition:background .15s;flex-shrink:0}
.po-toggle.on .po-switch{background:var(--g)}
.po-switch::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:7px;background:#fff;transition:transform .15s}
.po-toggle.on .po-switch::after{transform:translateX(14px)}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .22s ease forwards}
@keyframes sheetUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
.sheet{animation:sheetUp .25s cubic-bezier(.4,0,.2,1) forwards}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-top">
      <div>
        <div class="logo">GRIND<em>LOG</em></div>
      </div>
      <div class="streak-pill">
        <div class="streak-fire">🔥</div>
        <div>
          <div class="streak-n" id="streakNum">0</div>
          <div class="streak-lbl">DAY STREAK</div>
        </div>
      </div>
    </div>
    <div class="wk-progress">
      <div class="wk-lbl">THIS WEEK</div>
      <div class="wk-bar-wrap"><div class="wk-bar-fill" id="wkBar" style="width:0%"></div></div>
      <div class="wk-val" id="wkProg">0/6</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab on" data-v="week">WEEK</button>
    <button class="tab" data-v="log">TODAY</button>
    <button class="tab" data-v="stats">STATS</button>
  </div>
  <div class="content" id="content"></div>
</div>
<div id="sheetRoot"></div>

<script>
/* ═══════════════════════════════════════════
   DATA DEFINITIONS
═══════════════════════════════════════════ */
var DAYS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
var MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

var BASE_PLANS={
  Mon:{type:"workout",label:"Push",emoji:"💪"},
  Tue:{type:"walk",  label:"Walk",emoji:"🚶"},
  Wed:{type:"workout",label:"Pull",emoji:"💪"},
  Thu:{type:"walk",  label:"Walk",emoji:"🚶"},
  Fri:{type:"workout",label:"Legs+Core",emoji:"💪"},
  Sat:{type:"walk",  label:"Walk",emoji:"🚶"},
  Sun:{type:"walk",  label:"Walk",emoji:"🚶"}   // ← Sunday now has walk
};

var BASE_WO={
  "Push":[
    {name:"DB Floor Press",     sets:3,reps:[12,12,12]},
    {name:"DB Shoulder Press",  sets:3,reps:[12,12,12]},
    {name:"Lateral Raise",      sets:3,reps:[15,15,15]},
    {name:"Diamond Push-ups",   sets:3,reps:[12,12,12]},
    {name:"Overhead Tricep Ext",sets:3,reps:[12,12,12]}
  ],
  "Pull":[
    {name:"Bent-over Row",   sets:3,reps:[12,12,12]},
    {name:"Reverse Fly",     sets:3,reps:[15,15,15]},
    {name:"Single-arm Row",  sets:3,reps:[12,12,12]},
    {name:"DB Curl",         sets:3,reps:[12,12,12]},
    {name:"Hammer Curl",     sets:3,reps:[12,12,12]}
  ],
  "Legs+Core":[
    {name:"Goblet Squat",       sets:3,reps:[15,15,15]},
    {name:"Romanian Deadlift",  sets:3,reps:[12,12,12]},
    {name:"Reverse Lunge",      sets:3,reps:[12,12,12]},
    {name:"Plank",              sets:3,reps:[1,1,1]},
    {name:"Knee Raise",         sets:3,reps:[15,15,15]},
    {name:"Dead Bug",           sets:3,reps:[10,10,10]}
  ]
};

/* Storage key — bump to v5 to avoid collisions with old data */
var SK="grindlog_v5";
var data={}, view="week", activeDay=todayName(), weekOff=0;

/* ═══════════════════════════════════════════
   STORAGE HELPERS
═══════════════════════════════════════════ */
function getStore(){try{return JSON.parse(localStorage.getItem(SK))||{};}catch(e){return{};}}
function saveStore(s){try{localStorage.setItem(SK,JSON.stringify(s));}catch(e){}}
function save(){var s=getStore();s.log=data;saveStore(s);}

(function init(){
  var s=getStore();
  data=s.log||{};
})();

/* ═══════════════════════════════════════════
   EXERCISE RESOLUTION
   priority: weekOverride > permOverride > base
═══════════════════════════════════════════ */
function getExercises(label, wid){
  wid=wid||weekId(weekOff);
  var s=getStore();
  if(s.wkEx&&s.wkEx[wid]&&s.wkEx[wid][label]) return clone(s.wkEx[wid][label]);
  if(s.pmEx&&s.pmEx[label])                    return clone(s.pmEx[label]);
  return clone(BASE_WO[label]||[]);
}
function saveExercises(label, arr, scope){
  var s=getStore(), wid=weekId(weekOff);
  if(scope==="week"){
    if(!s.wkEx)s.wkEx={};
    if(!s.wkEx[wid])s.wkEx[wid]={};
    s.wkEx[wid][label]=clone(arr);
  } else {
    if(!s.pmEx)s.pmEx={};
    s.pmEx[label]=clone(arr);
    // clear week override so perm shows immediately
    if(s.wkEx&&s.wkEx[wid]&&s.wkEx[wid][label]) delete s.wkEx[wid][label];
  }
  saveStore(s);
}

/* ═══════════════════════════════════════════
   PROGRESSIVE OVERLOAD LOGS
═══════════════════════════════════════════ */
function getPO(day, exName){
  var s=getStore(), k=weekId(weekOff)+"-"+day+"-"+exName;
  return (s.po&&s.po[k])||[];
}
function savePO(day, exName, arr){
  var s=getStore();
  if(!s.po)s.po={};
  s.po[weekId(weekOff)+"-"+day+"-"+exName]=arr;
  saveStore(s);
}

/* ═══════════════════════════════════════════
   REST-DAY SWAPS
   restSwaps[wid-day] = targetDay  (day took a rest, workout moved to target)
═══════════════════════════════════════════ */
function isRestSwapped(day){
  var s=getStore();
  return !!(s.rs&&s.rs[weekId(weekOff)+"-"+day]);
}
function getSwapTarget(day){
  var s=getStore();
  return s.rs&&s.rs[weekId(weekOff)+"-"+day];
}
function setSwap(fromDay, toDay){
  var s=getStore();
  if(!s.rs)s.rs={};
  s.rs[weekId(weekOff)+"-"+fromDay]= toDay===null?undefined:toDay;
  if(toDay===null) delete s.rs[weekId(weekOff)+"-"+fromDay];
  saveStore(s);
}
function getPlan(day){
  // was a workout swapped FROM this day? → rest_walk
  if(isRestSwapped(day)) return {type:"rest_walk",label:"Rest Day",emoji:"🛌"};
  // was a workout swapped TO this day?
  var s=getStore(), wid=weekId(weekOff);
  if(s.rs){
    for(var k in s.rs){
      if(k.indexOf(wid+"-")===0){
        var fd=k.replace(wid+"-","");
        if(s.rs[k]===day) return Object.assign({},BASE_PLANS[fd],{swappedFrom:fd});
      }
    }
  }
  return BASE_PLANS[day];
}

/* ═══════════════════════════════════════════
   UTILITY
═══════════════════════════════════════════ */
function clone(x){return JSON.parse(JSON.stringify(x));}
function esc(s){return s.replace(/"/g,"&quot;").replace(/'/g,"&#39;");}
function todayName(){return["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][new Date().getDay()];}
function ordinal(n){var s=["th","st","nd","rd"],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}
function weekId(off){
  off=off||0;
  var d=new Date();d.setDate(d.getDate()+off*7);
  var j=new Date(d.getFullYear(),0,1);
  var w=Math.ceil(((d-j)/86400000+j.getDay()+1)/7);
  return d.getFullYear()+"-W"+w;
}
function weekDates(off){
  var now=new Date(),day=now.getDay();
  var diff=day===0?-6:1-day;
  var mon=new Date(now);mon.setDate(now.getDate()+diff+(off||0)*7);
  var out=[];for(var i=0;i<7;i++){var d=new Date(mon);d.setDate(mon.getDate()+i);out.push(d);}
  return out;
}
function fmtRange(off){
  var ds=weekDates(off),a=ds[0],b=ds[6];
  return ordinal(a.getDate())+" "+MONTHS[a.getMonth()]+" – "+ordinal(b.getDate())+" "+MONTHS[b.getMonth()];
}
function dk(day,off){return weekId(off===undefined?weekOff:off)+"-"+day;}
function dd(day,off){return data[dk(day,off)]||{};}
function patch(day,obj,off){
  var k=dk(day,off===undefined?weekOff:off);
  data[k]=Object.assign({},data[k],obj);save();
}

/* ═══════════════════════════════════════════
   PROGRESS / COMPLETION
═══════════════════════════════════════════ */
function dayProgress(day,off){
  var p=getPlan(day),d=dd(day,off===undefined?weekOff:off);
  if(p.type==="rest")return 100;
  if(p.type==="rest_walk"||p.type==="walk") return d.walk1?100:0;
  var exs=getExercises(p.label,weekId(off===undefined?weekOff:off));
  if(!exs.length)return 0;
  var done=exs.filter(function(e){return(d.exercises||{})[e.name];}).length;
  return Math.round(done/exs.length*100);
}
function dayDone(day,off){
  var p=getPlan(day),d=dd(day,off===undefined?weekOff:off);
  if(p.type==="rest")return true;
  if(p.type==="rest_walk"||p.type==="walk") return!!d.walk1;
  var exs=getExercises(p.label,weekId(off===undefined?weekOff:off));
  var done=exs.filter(function(e){return(d.exercises||{})[e.name];}).length;
  return exs.length>0&&(done/exs.length*100)>=40&&!!d.walk1;
}
function totalKcal(day,off){
  var d=dd(day,off);
  return(parseFloat(d.exKcal)||0)+(parseFloat(d.walkKcal)||0);
}
function calcStreak(){
  var s=0,d=new Date();
  for(var i=0;i<90;i++){
    if(i>0)d.setDate(d.getDate()-1);
    var n=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()];
    var bp=BASE_PLANS[n];
    // pure rest — skip but don't break streak (there are none now, but keep for safety)
    if(bp&&bp.type==="rest"){if(i>0)s++;continue;}
    var j=new Date(d.getFullYear(),0,1);
    var w=Math.ceil(((d-j)/86400000+j.getDay()+1)/7);
    var wid2=d.getFullYear()+"-W"+w;
    var k=wid2+"-"+n;
    var d2=data[k]||{};
    var ok=false;
    if(bp.type==="walk") ok=!!d2.walk1;
    else{
      var exs2=getExercises(bp.label,wid2),ce=d2.exercises||{};
      var dn=exs2.filter(function(x){return ce[x.name];}).length;
      ok=exs2.length>0&&(dn/exs2.length*100)>=40&&!!d2.walk1;
    }
    if(ok)s++;else if(i>0)break;
  }
  return s;
}

/* ═══════════════════════════════════════════
   HEADER
═══════════════════════════════════════════ */
function updateHeader(){
  document.getElementById("streakNum").textContent=calcStreak();
  // week progress counts workout + walk days (exclude pure rest — none now)
  var wTotal=DAYS.filter(function(d){return BASE_PLANS[d].type!=="rest";}).length; // 7
  var wDone=DAYS.filter(function(d){return dayDone(d,0);}).length;
  document.getElementById("wkProg").textContent=wDone+"/"+wTotal;
  document.getElementById("wkBar").style.width=Math.round(wDone/wTotal*100)+"%";
}

/* ═══════════════════════════════════════════
   RENDER CONTROLLER
═══════════════════════════════════════════ */
function render(){
  updateHeader();
  document.querySelectorAll(".tab").forEach(function(t){t.classList.toggle("on",t.dataset.v===view);});
  var c=document.getElementById("content");
  c.innerHTML="";
  var d=document.createElement("div");d.className="fade";
  if(view==="week")     d.innerHTML=renderWeek();
  else if(view==="log") d.innerHTML=renderLog();
  else                  d.innerHTML=renderStats();
  c.appendChild(d);
  bind();
}

   WEEK VIEW
═══════════════════════════════════════════ */
function renderWeek(){
  var today=todayName();

  var h='<div class="wk-nav">'
    +'<button class="nav-arr" id="wPrev">‹</button>'
    +'<div style="text-align:center"><div class="wk-nav-lbl">'+lbl+'</div><div class="wk-nav-date">'+fmtRange(weekOff)+'</div></div>'
    +'<button class="nav-arr'+(weekOff===0?" dim":"")+'" id="wNext">›</button>'
    +'</div>';

  DAYS.forEach(function(day){
    var p=getPlan(day);
    var isToday=day===today&&weekOff===0;
    var isRest=p.type==="rest";
    var isRestWalk=p.type==="rest_walk";
    var prog=dayProgress(day),kcal=totalKcal(day);
    var done=dayDone(day);

      +(done&&!isRest?'<span class="pill pill-done">✓</span>':"")
      +'</div>'
      +'<div class="day-sub">'+p.label+'</div>'
      +(kcal>0?'<div class="day-kcal">'+kcal+' kcal</div>':"")
      +(!isRest?'<div class="mini-prog"><div class="mini-prog-fill" style="width:'+prog+'%"></div></div>':"")
      +'</div>'
      +'<div class="day-right'+(prog===100?" g":"")+'">'+pctTxt+'</div>'
      +'</div>';
  });
  return h;
}

/* ═══════════════════════════════════════════
   LOG VIEW
═══════════════════════════════════════════ */
function renderLog(){
  var today=todayName();
  var p=getPlan(activeDay);
  var d=dd(activeDay);
  var label=p.label;
  var isWorkout=p.type==="workout"||(p.swappedFrom!==undefined);
  var exs=isWorkout?getExercises(label):[];
  var cExs=d.exercises||{};
  var exDone=exs.filter(function(e){return cExs[e.name];}).length;
  var pct=exs.length?Math.round(exDone/exs.length*100):0;
  var complete=dayDone(activeDay);
  var kcalTotal=totalKcal(activeDay);
  var isRestWalk=p.type==="rest_walk";

  /* day tab strip */
  var h='<div class="day-scroller">';
  DAYS.forEach(function(day){
    var isOn=day===activeDay,isDone=dayDone(day),isToday=day===today&&weekOff===0;
    h+='<button class="dtab'+(isOn?" on":isDone?" done":"")+(isToday&&!isOn?" tod":"")+'" data-ld="'+day+'">'+day+'</button>';
  });
  h+='</div>';

  /* header */
  h+='<div class="log-title-row"><div class="log-title">'+p.emoji+' '+p.label+'</div>'
    +(complete?'<div class="log-complete-badge">✓ DONE</div>':"")+'</div>';

  /* ── PURE REST (shouldn't occur anymore, but safe fallback) ── */
  if(p.type==="rest"){
    return h+'<div class="rest-screen"><div class="rest-em">😴</div><div class="rest-ttl">REST DAY</div><div class="rest-sub">Recovery is part of the program.</div></div>';
  }

  /* ── REST-WALK (swapped day) ── */
  if(isRestWalk){
    h+='<button class="rest-btn active-rest" id="undoRestBtn"><span class="rest-btn-icon">↩</span> Undo rest day</button>';
    h+='<div style="padding:16px 0 8px;text-align:center;font-size:11px;color:var(--t3);letter-spacing:.5px">Workout moved · walk still counts 🚶</div>';
    h+=renderWalkSection(d,kcalTotal);
    return h;
  }

  /* ── REST DAY BUTTON (workout days) ── */
  if(isWorkout){
    h+='<button class="rest-btn" id="restDayBtn"><span class="rest-btn-icon">🛌</span> Take a rest day</button>';
  }

  /* ── EXERCISES ── */
  if(isWorkout&&exs.length){
    h+='<div class="sec">EXERCISES &nbsp;'+pct+'%</div>';
    h+='<div class="prog-track"><div class="prog-track-fill" style="width:'+pct+'%"></div></div>';
    h+='<div class="ex-list">';
    exs.forEach(function(ex){
      var done=cExs[ex.name];
      var po=getPO(activeDay,ex.name);
      var hasPO=po.length>0&&po.some(function(v){return v>0;});
      var setsLabel=hasPO?po.map(function(v,i){return"S"+(i+1)+":"+v;}).join(" "):ex.sets+"×"+ex.reps.join("/");
      h+='<div class="ex-item" data-ex="'+esc(ex.name)+'">'
        +'<div class="chk'+(done?" on":"")+'"></div>'
        +'<div class="ex-label">'
        +'<div class="ex-nm'+(done?" done":"")+'">'+ex.name+'</div>'
        +'<div class="ex-meta"><span class="ex-sets-lbl">'+setsLabel+'</span>'
        +(hasPO?'<span class="po-tag">PO</span>':"")
        +'</div></div>'
        +'<button class="ex-btn" data-exedit="'+esc(ex.name)+'">EDIT</button>'
        +'</div>';
    });
    h+='</div>';
    h+='<div class="add-row" id="addExBtn"><div class="add-row-icon">+</div><span>Add exercise</span></div>';
    h+='<div class="card" style="margin-bottom:16px"><div class="card-row">'
      +'<span class="card-lbl">WORKOUT KCAL</span>'
      +'<input class="card-val" type="number" inputmode="decimal" placeholder="0" value="'+(d.exKcal||"")+'" id="exKcalIn"/>'
      +'<span class="card-unit">kcal</span></div></div>';
  }

  /* ── WALK ── */
  h+='<div class="sec">WALK</div>';
  h+=renderWalkSection(d,kcalTotal);

  /* ── METRICS ── */
  h+='<div class="sec">LOG</div>';
  h+='<div class="card"><div class="card-row">'
    +'<span class="card-lbl">WEIGHT</span>'
    +'<input class="w-input" type="number" inputmode="decimal" placeholder="kg" value="'+(d.weight||"")+'" id="wIn"/>'
    +'</div></div>';
  h+='<div class="card"><div class="sec" style="margin-bottom:8px">NOTES</div>'
    +'<textarea class="n-input" rows="3" placeholder="How did it feel?" id="nIn">'+(d.note||"")+'</textarea></div>';
  return h;
}

function renderWalkSection(d, kcalTotal){
  var wDone=d.walk1;
  var h='<div class="walk-toggle'+(wDone?" on":"")+'" id="walkBtn">'
    +'<div class="walk-icon">🚶</div>'
    +'<div class="walk-text"><div class="walk-title">Walk</div>'
    +'<div class="walk-hint">'+(wDone?"Logged ✓":"Tap to log")+'</div></div>'
    +'<div class="walk-check"></div></div>';
  h+='<div class="card" style="margin-top:8px;margin-bottom:8px"><div class="card-row">'

  h+='<div class="total-card">'
    +'<div><div class="total-lbl">TOTAL BURNT</div></div>'
    +'<div><span class="total-val" id="totalKcalDisp">'+(kcalTotal||0)+'</span><span class="total-unit">kcal</span></div></div>';
  return h;
}

/* ═══════════════════════════════════════════
   STATS VIEW
═══════════════════════════════════════════ */
function renderStats(){
  var s=calcStreak(),totalComplete=0;
  Object.keys(data).forEach(function(k){
    var parts=k.split("-"),day=parts[parts.length-1];
    if(!BASE_PLANS[day])return;
    var d2=data[k],p2=BASE_PLANS[day];
    if(p2.type==="walk"&&d2.walk1){totalComplete++;return;}
    if(p2.type==="workout"){
      var wid2=k.split("-"+day)[0];
      var exs2=getExercises(p2.label,wid2),ce=d2.exercises||{};
      var dn=exs2.filter(function(x){return ce[x.name];}).length;
      if(exs2.length&&(dn/exs2.length*100)>=40&&d2.walk1)totalComplete++;
    }
  });
  var wDone=DAYS.filter(function(d){return dayDone(d,0);}).length;
  var wTotal=7;
  var walks=Object.keys(data).filter(function(k){return data[k].walk1;}).length;

  var h='<div class="stats-h">PROGRESS</div><div class="sg">';
  [["🔥","Streak",s+" days"],["✅","Done",""+totalComplete],["💪","This Week",wDone+"/"+wTotal],["🚶","Walks",""+walks]]
  .forEach(function(r){h+='<div class="sc"><div class="sc-em">'+r[0]+'</div><div class="sc-val">'+r[2]+'</div><div class="sc-lbl">'+r[1].toUpperCase()+'</div></div>';});
  h+='</div>';

  /* Frequency chart */
  var weeks=[];
  for(var i=7;i>=0;i--){
    var wid3=weekId(-i);
    var activeDays=DAYS.filter(function(d){return BASE_PLANS[d].type!=="rest";});
    var comp=activeDays.filter(function(day){
      var k=wid3+"-"+day,d2=data[k]||{},p2=BASE_PLANS[day];
      if(p2.type==="walk")return!!d2.walk1;
      var ex2=getExercises(p2.label,wid3),ce=d2.exercises||{};
      var dn=ex2.filter(function(x){return ce[x.name];}).length;
      return ex2.length&&(dn/ex2.length*100)>=40&&!!d2.walk1;
    }).length;
    weeks.push({pct:Math.round(comp/activeDays.length*100),lbl:i===0?"Now":i+"W"});
  }
  var W=300,H=110,pL=28,pB=20,pT=10,gW=W-pL-8,gH=H-pB-pT,n=weeks.length,xS=gW/(n-1);
  function gx(ii){return pL+ii*xS;}
  function gy(v){return pT+gH-(v/100)*gH;}
  var aPts=weeks.map(function(w,ii){return gx(ii)+","+gy(w.pct);}).join(" ");
  var fPts=gx(0)+","+gy(0)+" "+aPts+" "+gx(n-1)+","+gy(0);
  h+='<div class="wc"><div class="wc-h">COMPLETION % — LAST 8 WEEKS</div>'
    +'<svg width="100%" height="'+H+'" viewBox="0 0 '+W+' '+H+'">'
    +[0,50,100].map(function(v){return'<line x1="'+pL+'" y1="'+gy(v)+'" x2="'+(W-8)+'" y2="'+gy(v)+'" stroke="#1e1e1e" stroke-width="1"/>'
      +'<text x="'+(pL-4)+'" y="'+(gy(v)+3)+'" text-anchor="end" font-size="7" fill="#333">'+v+'%</text>';}).join("")
    +'<polygon points="'+fPts+'" fill="rgba(110,231,183,.06)"/>'
    +'<polyline points="'+aPts+'" fill="none" stroke="#6ee7b7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>';
  weeks.forEach(function(w,ii){
    h+='<circle cx="'+gx(ii)+'" cy="'+gy(w.pct)+'" r="3.5" fill="'+(w.pct>=40?"#6ee7b7":"#f87171")+'"/>';
    h+='<text x="'+gx(ii)+'" y="'+(H-3)+'" text-anchor="middle" font-size="7" fill="#444">'+w.lbl+'</text>';
  });
  h+='</svg></div>';

  /* Weight chart */
  var weights=Object.keys(data).filter(function(k){return data[k].weight;})
    .sort(function(a,b){return(data[a].ts||0)-(data[b].ts||0);}).slice(-8);
  if(!weights.length){h+='<div class="w-empty">LOG WEIGHT TO SEE TREND</div>';}
  else{
    var vals=weights.map(function(k){return parseFloat(data[k].weight);});
    var mn=Math.min.apply(null,vals)-1,mx=Math.max.apply(null,vals)+1,CH=100;
    function px2(ii){return ii*50+25;}function py2(v){return CH-((v-mn)/(mx-mn))*(CH-24)-12;}
    var pts2=vals.map(function(v,ii){return px2(ii)+","+py2(v);}).join(" ");
    var diff=vals[0]-vals[vals.length-1];
    h+='<div class="wc"><div class="wc-h">WEIGHT TREND (kg)</div>'
      +'<svg width="100%" height="'+CH+'" viewBox="0 0 '+(weights.length*50)+' '+CH+'" preserveAspectRatio="none">'
      +'<polyline points="'+pts2+'" fill="none" stroke="#6ee7b7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
    vals.forEach(function(v,ii){
      h+='<circle cx="'+px2(ii)+'" cy="'+py2(v)+'" r="4" fill="#6ee7b7"/>'
        +'<text x="'+px2(ii)+'" y="'+(CH-1)+'" text-anchor="middle" font-size="8" fill="#444">'+weights[ii].split("-").pop()+'</text>';
    });
    h+='</svg><div class="wc-foot"><span>Start: <span class="g">'+vals[0]+'kg</span></span>'
      +'<span>Latest: <span class="g">'+vals[vals.length-1]+'kg</span></span>'
      +(vals.length>1?'<span class="'+(diff>0?"g":"r")+'">'+(diff>0?"↓":"↑")+Math.abs(diff).toFixed(1)+'kg</span>':"")
      +'</div></div>';
  }
  h+='<div class="tip"><div class="tip-h">💡 REMEMBER</div>'
    +'<div class="tip-b">Abs show around <em>10–12% body fat</em>. Walks + deficit get you there. Weights build the muscle underneath. Give it <em>8–12 weeks</em>.</div></div>';
  return h;
}

    h+='<button class="dpick'+(ok?"":" off")+'" data-rswap="'+day+'">'+day+'</button>';
  });
  h+='</div><div style="font-size:10px;color:var(--t3);text-align:center;margin-bottom:4px">Walking stays on your rest day</div>';
  openSheet(h);
  document.querySelectorAll("[data-rswap]").forEach(function(btn){
    btn.addEventListener("click",function(){
      setSwap(activeDay,btn.dataset.rswap);
      closeSheet();render();
    });
  });
}

/* ── EXERCISE EDIT SHEET ── */
function openEditSheet(exName){
  var p=getPlan(activeDay);
  var label=p.label;
  var exs=getExercises(label);
  var ex=exs.filter(function(e){return e.name===exName;})[0];
  if(!ex)return;
  var po=getPO(activeDay,exName);
  var hasPO=po.length>0&&po.some(function(v){return v>0;});

  function buildSheet(isPOMode, curSets, curReps, curPO){
    var h='<div class="sheet-title">'+exName+'</div><div class="sheet-sub">EDIT EXERCISE</div>'
      +'<label class="f-label">NAME</label>'
      +'<input class="f-input" id="exNm" value="'+esc(exName)+'"/>';

    if(!isPOMode){
      h+='<label class="f-label">SETS</label>'
        +'<input class="f-input" id="exSets" type="number" inputmode="numeric" value="'+curSets+'" style="margin-bottom:14px"/>'
        +'<label class="f-label">REPS PER SET</label>'
        +'<div class="set-grid" id="repsGrid">';
      for(var i=0;i<curSets;i++){
        h+='<div class="set-r"><span class="set-r-lbl">SET '+(i+1)+'</span>'
          +'<input class="set-r-in" type="number" inputmode="numeric" data-si="'+i+'" value="'+(curReps[i]||12)+'"/></div>';
      }
      h+='</div>';
    } else {
      h+='<div style="font-size:10px;color:var(--g);letter-spacing:1px;margin-bottom:10px">📈 LOG REPS DONE THIS SESSION</div>'
        +'<div class="set-grid" id="poGrid">';
      for(var j=0;j<curSets;j++){
        h+='<div class="set-r"><span class="set-r-lbl" style="color:#2d7a52">SET '+(j+1)+'</span>'
          +'<input class="set-r-in po-in" type="number" inputmode="numeric" data-pi="'+j+'" value="'+(curPO[j]||"")+'" placeholder="reps done"/></div>';
      }
      h+='</div>';
    }

    h+='<div class="po-toggle'+(isPOMode?" on":"")+'" id="poToggle">'
      +'<span class="po-toggle-lbl">📈 Progressive Overload</span>'
      +'<div class="po-switch"></div></div>';

    h+='<label class="f-label">APPLY TO</label>'
      +'<div class="scope">'
      +'<button class="scope-opt on" id="scopeW">THIS WEEK</button>'
      +'<button class="scope-opt" id="scopeP">PERMANENT</button>'
      +'</div>'
      +'<button class="sb prim" id="saveEx">SAVE</button>'
      +'<button class="sb del" id="delEx">DELETE EXERCISE</button>'
      +'<button class="sb sec" id="cancelEx">CANCEL</button>';
    return h;
  }

  var isPOMode=hasPO;
  openSheet(buildSheet(isPOMode, ex.sets, ex.reps, po));

  var scope="week";
  function bindSheet(){
    var scopeW=document.getElementById("scopeW"),scopeP=document.getElementById("scopeP");
    if(scopeW)scopeW.addEventListener("click",function(){scope="week";scopeW.classList.add("on");scopeP.classList.remove("on");});
    if(scopeP)scopeP.addEventListener("click",function(){scope="perm";scopeP.classList.add("on");scopeW.classList.remove("on");});

    var poTog=document.getElementById("poToggle");
    if(poTog)poTog.addEventListener("click",function(){
      isPOMode=!isPOMode;
      var curSets=parseInt((document.getElementById("exSets")||{value:ex.sets}).value)||ex.sets;
      var curReps=getRepsFromGrid()||ex.reps;
      var curPO=getPOFromGrid()||po;
      openSheet(buildSheet(isPOMode,curSets,curReps,curPO));
      bindSheet();
    });

    // dynamic reps rebuild on sets change
    var setsIn=document.getElementById("exSets");
    if(setsIn)setsIn.addEventListener("input",function(){
      var ns=parseInt(this.value)||1;
      var cr=getRepsFromGrid();
      var rg=document.getElementById("repsGrid");
      if(!rg)return;
      var rh="";
      for(var k=0;k<ns;k++){
        rh+='<div class="set-r"><span class="set-r-lbl">SET '+(k+1)+'</span>'
          +'<input class="set-r-in" type="number" inputmode="numeric" data-si="'+k+'" value="'+(cr[k]||12)+'"/></div>';
      }
      rg.innerHTML=rh;
    });

    var saveBtn=document.getElementById("saveEx");
    if(saveBtn)saveBtn.addEventListener("click",function(){
      var newName=(document.getElementById("exNm")||{value:exName}).value.trim()||exName;
      var sets=parseInt((document.getElementById("exSets")||{value:ex.sets}).value)||ex.sets;
      var reps=isPOMode?ex.reps:getRepsFromGrid()||ex.reps;
      var poVals=isPOMode?getPOFromGrid():[];

      if(poVals.length) savePO(activeDay,exName,poVals);

      var exsList=getExercises(label);
      var idx=exsList.findIndex(function(e){return e.name===exName;});
      if(idx>=0) exsList[idx]={name:newName,sets:sets,reps:reps};
      saveExercises(label,exsList,scope);

      if(newName!==exName){
        var d2=dd(activeDay),ce=Object.assign({},d2.exercises||{});
        if(ce[exName]!==undefined){ce[newName]=ce[exName];delete ce[exName];}
        patch(activeDay,{exercises:ce});
        // move PO to new name
        var oldPO=getPO(activeDay,exName);
        if(oldPO.length)savePO(activeDay,newName,oldPO);
      }
      closeSheet();render();
    });

    var delBtn=document.getElementById("delEx");
    if(delBtn)delBtn.addEventListener("click",function(){
      if(!confirm('Delete "'+exName+'"?'))return;
      var exsList=getExercises(label).filter(function(e){return e.name!==exName;});
      saveExercises(label,exsList,scope);
      var d2=dd(activeDay),ce=Object.assign({},d2.exercises||{});
      delete ce[exName];
      patch(activeDay,{exercises:ce});
      closeSheet();render();
    });

    var cancelBtn=document.getElementById("cancelEx");
    if(cancelBtn)cancelBtn.addEventListener("click",closeSheet);
  }
  bindSheet();

  function getRepsFromGrid(){
    var arr=[];
    document.querySelectorAll("[data-si]").forEach(function(i){arr[parseInt(i.dataset.si)]=parseInt(i.value)||12;});
    return arr.length?arr:null;
  }
  function getPOFromGrid(){
    var arr=[];
    document.querySelectorAll("[data-pi]").forEach(function(i){
      var v=parseInt(i.value);
      if(!isNaN(v))arr[parseInt(i.dataset.pi)]=v;
    });
    return arr;
  }
}

/* ── ADD EXERCISE SHEET ── */
function openAddSheet(){
  var p=getPlan(activeDay);
  var label=p.label;
  var h='<div class="sheet-title">+ Add Exercise</div>'
    +'<div class="sheet-sub">'+label.toUpperCase()+'</div>'
    +'<label class="f-label">NAME</label><input class="f-input" id="newNm" placeholder="e.g. Incline Press"/>'
    +'<label class="f-label">SETS</label><input class="f-input" id="newSets" type="number" inputmode="numeric" value="3"/>'
    +'<label class="f-label">REPS PER SET</label>'
    +'<div class="set-grid" id="newRepsGrid">'
    +'<div class="set-r"><span class="set-r-lbl">SET 1</span><input class="set-r-in" type="number" inputmode="numeric" data-ni="0" value="12"/></div>'
    +'<div class="set-r"><span class="set-r-lbl">SET 2</span><input class="set-r-in" type="number" inputmode="numeric" data-ni="1" value="12"/></div>'
    +'<div class="set-r"><span class="set-r-lbl">SET 3</span><input class="set-r-in" type="number" inputmode="numeric" data-ni="2" value="12"/></div>'
    +'</div>'
    +'<label class="f-label">APPLY TO</label>'
    +'<div class="scope"><button class="scope-opt on" id="scopeW">THIS WEEK</button><button class="scope-opt" id="scopeP">PERMANENT</button></div>'
    +'<button class="sb prim" id="addConfirm">ADD</button>'
    +'<button class="sb sec" id="addCancel">CANCEL</button>';
  openSheet(h);

  var scope="week";
  document.getElementById("scopeW").addEventListener("click",function(){scope="week";this.classList.add("on");document.getElementById("scopeP").classList.remove("on");});
  document.getElementById("scopeP").addEventListener("click",function(){scope="perm";this.classList.add("on");document.getElementById("scopeW").classList.remove("on");});

  document.getElementById("newSets").addEventListener("input",function(){
    var ns=parseInt(this.value)||1,g=document.getElementById("newRepsGrid"),rh="";
    for(var k=0;k<ns;k++)rh+='<div class="set-r"><span class="set-r-lbl">SET '+(k+1)+'</span><input class="set-r-in" type="number" inputmode="numeric" data-ni="'+k+'" value="12"/></div>';
    g.innerHTML=rh;
  });

  document.getElementById("addCancel").addEventListener("click",closeSheet);
  document.getElementById("addConfirm").addEventListener("click",function(){
    var name=(document.getElementById("newNm").value||"").trim();
    if(!name)return;
    var sets=parseInt(document.getElementById("newSets").value)||3;
    var reps=[];
    document.querySelectorAll("[data-ni]").forEach(function(i){reps[parseInt(i.dataset.ni)]=parseInt(i.value)||12;});
    var exsList=getExercises(label);
    exsList.push({name:name,sets:sets,reps:reps});
    saveExercises(label,exsList,scope);
    closeSheet();render();
  });
}

/* ═══════════════════════════════════════════
   BIND
═══════════════════════════════════════════ */
function bind(){
  /* tab nav */
  document.querySelectorAll(".tab").forEach(function(t){
    t.addEventListener("click",function(){view=t.dataset.v;render();});
  });

  if(view==="week"){
    var wPrev=document.getElementById("wPrev"),wNext=document.getElementById("wNext");
    if(wPrev)wPrev.addEventListener("click",function(){weekOff--;render();});
    if(wNext)wNext.addEventListener("click",function(){if(weekOff<0){weekOff++;render();}});
    document.querySelectorAll(".day-card:not(.is-rest)").forEach(function(card){
      card.addEventListener("click",function(){activeDay=card.dataset.day;view="log";render();});
    });
  }

  if(view==="log"){
    /* day tabs */
    document.querySelectorAll("[data-ld]").forEach(function(btn){
      btn.addEventListener("click",function(){activeDay=btn.dataset.ld;render();});
    });

    /* exercise check */
    document.querySelectorAll(".ex-item").forEach(function(row){
      row.addEventListener("click",function(e){
        if(e.target.closest(".ex-btn"))return;
        var ex=row.dataset.ex,d=dd(activeDay),cExs=Object.assign({},d.exercises||{});
        cExs[ex]=!cExs[ex];patch(activeDay,{exercises:cExs});render();
      });
    });

    /* exercise edit */
    document.querySelectorAll(".ex-btn[data-exedit]").forEach(function(btn){
      btn.addEventListener("click",function(e){e.stopPropagation();openEditSheet(btn.dataset.exedit);});
    });

    /* add exercise */
    var addRow=document.getElementById("addExBtn");
    if(addRow)addRow.addEventListener("click",openAddSheet);

    /* rest day buttons */
    var restBtn=document.getElementById("restDayBtn");
    if(restBtn)restBtn.addEventListener("click",openRestSheet);
    var undoBtn=document.getElementById("undoRestBtn");
    if(undoBtn)undoBtn.addEventListener("click",function(){
      // find which day was swapped from
      var s=getStore(),wid=weekId(weekOff);
      if(s.rs){
        Object.keys(s.rs).forEach(function(k){
          if(k===wid+"-"+activeDay||s.rs[k]===activeDay){
            var fd=k.replace(wid+"-","");
            setSwap(fd,null);
          }
        });
      }
      render();
    });

    /* walk toggle */
    var walkBtn=document.getElementById("walkBtn");
    if(walkBtn)walkBtn.addEventListener("click",function(){patch(activeDay,{walk1:!dd(activeDay).walk1});render();});

    /* kcal inputs */
    function updateTotal(){
      var ex=parseFloat((document.getElementById("exKcalIn")||{value:0}).value)||0;
      var wk=parseFloat((document.getElementById("walkKcalIn")||{value:0}).value)||0;
      var disp=document.getElementById("totalKcalDisp");
      if(disp)disp.textContent=ex+wk;
    }
    var exKI=document.getElementById("exKcalIn");
    if(exKI){exKI.addEventListener("input",updateTotal);exKI.addEventListener("change",function(){patch(activeDay,{exKcal:this.value});updateTotal();});}
    var wkKI=document.getElementById("walkKcalIn");
    if(wkKI){wkKI.addEventListener("input",updateTotal);wkKI.addEventListener("change",function(){patch(activeDay,{walkKcal:this.value});updateTotal();});}
    var wIn=document.getElementById("wIn");
    if(wIn)wIn.addEventListener("change",function(){patch(activeDay,{weight:this.value,ts:Date.now()});});
    var nIn=document.getElementById("nIn");
    if(nIn)nIn.addEventListener("input",function(){patch(activeDay,{note:this.value});});
  }
}

/* polyfill */
if(!Array.prototype.findIndex){Array.prototype.findIndex=function(fn){for(var i=0;i<this.length;i++)if(fn(this[i],i,this))return i;return -1;};}

render();
</script>
